<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobInsight Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 290px;
      padding: 18px 16px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #2d3748;
      background: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f0f2f5;
    }

    .logo { font-size: 20px; }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      color: #0a66c2;
      line-height: 1;
    }

    .header-text p {
      font-size: 10px;
      color: #a0a8b4;
      margin-top: 2px;
    }

    .field { margin-bottom: 12px; }

    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #a0a8b4;
      margin-bottom: 5px;
    }

    input[type="password"],
    input[type="text"] {
      width: 100%;
      padding: 9px 11px;
      border: 1px solid #e2e8f0;
      border-radius: 7px;
      font-size: 12px;
      color: #2d3748;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #0a66c2; }

    .hint {
      font-size: 10px;
      color: #a0a8b4;
      margin-top: 5px;
      line-height: 1.5;
    }

    .hint a { color: #0a66c2; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    .show-toggle {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
    }

    .show-toggle input { width: auto; }
    .show-toggle label {
      text-transform: none;
      letter-spacing: 0;
      font-weight: 500;
      font-size: 11px;
      color: #718096;
      margin: 0;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #0a66c2;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
      transition: background 0.15s;
    }

    button:hover { background: #004182; }
    button:active { background: #003166; }

    .status {
      font-size: 11px;
      text-align: center;
      margin-top: 8px;
      height: 16px;
      color: #0a7d4b;
      font-weight: 500;
    }

    .status.error { color: #c53030; }

    .divider {
      border: none;
      border-top: 1px solid #f0f2f5;
      margin: 14px 0 10px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #a0a8b4;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⚡</span>
    <div class="header-text">
      <h1>JobInsight</h1>
      <p>LinkedIn Job Analyzer</p>
    </div>
  </div>

  <div class="field">
    <label for="apiKey">OpenAI API Key</label>
    <input type="password" id="apiKey" placeholder="sk-…" autocomplete="off" spellcheck="false" />
    <div class="show-toggle">
      <input type="checkbox" id="showKey">
      <label for="showKey">Show key</label>
    </div>
    <div class="hint">
      Get your key at
      <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com/api-keys</a>.
      Stored locally — never uploaded anywhere except the OpenAI API.
    </div>
  </div>

  <button id="saveBtn">Save</button>
  <div class="status" id="status"></div>

  <hr class="divider">

  <div class="info-row">
    <span>JobInsight v1.0.0</span>
    <span>LinkedIn only • Auto-analyzes on open</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
